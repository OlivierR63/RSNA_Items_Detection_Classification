# Paths
dicom_studies_dir: "../../data/lumbar_spine/dicom/training/"
tfrecord_dir: "../../data/lumbar_spine/tfrecords"
csv_files:
  description: "../../data/lumbar_spine/csv/train_series_descriptions.csv"
  label_coordinates: "../../data/lumbar_spine/csv/train_label_coordinates.csv"
  train: "../../data/lumbar_spine/csv/train.csv"
output_dir: "../../data/lumbar_spine/output/"
checkpoint_path: "./data/lumbar_spine/output/checkpoints/model_checkpoint.keras"
system_stream_mirror_path: "./data/lumbar_spine/output/logs/full_session_output.log"
tensorflow_cache: "F:/tensorflow_cache/lumbar_train"
input_data_inspection: "../../data/lumbar_spine/input_data_inspection/"

# TFRecord files structuration
series_depth_threshold_percentile: 95  # Threshold value equal to the n-th percentile of the slice count per series.

# Images initial format
slices_input_format: (640, 640, 1)

# Output format
max_records: 25

# Models
model_2d:
  type: "MobileNetV2"
  img_shape: [224, 224, 3]
  output_shape: [7,7,1280]
  max_scaling_value: 1
  min_scaling_value: -1

model_3d:
  type: "cnn3d"
  input_shape: [7, 7, 1280]
  num_classes: 3

# training
train_split_ratio: 0.8
batch_size: 1
epochs: 3
patience: 5
learning_rate: 1e-4
clipnorm: 1.0
nb_cores: 0  # Number of logical cores used. If 0 : all the cores are mobilised.
dataset_buffer_size_mb: 100 # Buffer size expressed in MiB.

# Number of days to keep log files before automatic deletion
log_retention_days: 30


