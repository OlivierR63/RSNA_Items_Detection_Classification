# Paths
dicom_study_dir: "../../data/lumbar_spine/dicom/training/"
tfrecord_dir: "../../data/lumbar_spine/tfrecords"
csv_files:
  series_description: "../../data/lumbar_spine/csv/train_series_descriptions.csv"
  label_coordinates: "../../data/lumbar_spine/csv/train_label_coordinates.csv"
  train: "../../data/lumbar_spine/csv/train.csv"
output_dir: "../../data/lumbar_spine/output/"

# Output format
max_records: 25

# Models
model_2d:
  type: "MobileNetV2"
  img_shape: [224, 224, 3]
  output_shape: [7,7,1280]
  max_scaling_value: 1
  min_scaling_value: -1

model_3d:
  type: "cnn3d"
  input_shape: [7, 7, 1280]
  num_classes: 3

# training
train_split_ratio: 0.8
batch_size: 1
epochs: 1
patience: 5

#model_backbone: tf.keras.applications

# Checkpoints
checkpoint_path: "../../data/lumbar_spine/output/checkpoints/model_checkpoint.keras"
